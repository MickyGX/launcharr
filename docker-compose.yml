services:
  launcharr:
    container_name: launcharr
    image: mickygx/launcharr:latest #use :development for edge/dev builds
    ports:
      - "3333:3333"
    environment:
      - CONFIG_PATH=/app/config/config.json
      - DATA_DIR=/app/data
      - BASE_URL=http://localhost:3333
      - TRUST_PROXY=true
      - TRUST_PROXY_HOPS=1
      # Generate once: openssl rand -hex 32
      - SESSION_SECRET=replace-this-with-a-random-secret
      # IMPORTANT: The production image defaults to secure (HTTPS-only) session cookies.
      # Set this based on how you access Launcharr — if wrong, Plex and local login will fail.
      # Plain HTTP (direct local IP, no TLS reverse proxy, Tailscale without HTTPS):
      - COOKIE_SECURE=false
      # HTTPS only (reverse proxy with a valid cert):
      # - COOKIE_SECURE=true
      # - PUID=${PUID}
      # - PGID=${PGID}
      # - TZ=${TZ}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./data/icons/custom:/app/public/icons/custom
    restart: unless-stopped
